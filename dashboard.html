<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartWallet Dashboard</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">SmartWallet</div>
        <div class="user-info">
            <span id="userName">Hi, User</span>
            <button id="logoutBtn">Logout</button>
        </div>
    </header>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab-btn active" data-tab="wallet">Wallet</button>
        <button class="tab-btn" data-tab="transactions">Transactions</button>
        <button class="tab-btn" data-tab="profile">Profile</button>
    </div>

    <!-- Dynamic Tab Content -->
    <div class="tab-content">

        <!-- Wallet Section -->
        <section id="wallet" class="tab-section active">
            <div class="wallet-card">
                <h3>Balance</h3>
                <p id="balance">₹0</p>
                <div class="wallet-actions">
                    <button id="addMoneyBtn">Add Money</button>
                    <button id="sendMoneyBtn">Send Money</button>
                </div>
            </div>

            <!-- Add Money Form -->
            <div id="addMoneyForm" class="form-section hidden">
                <input type="number" id="addAmount" placeholder="Enter amount">
                <button id="addMoneySubmit">Add</button>
                <button class="cancelBtn">Cancel</button>
            </div>

            <!-- Send Money Form -->
            <div id="sendMoneyForm" class="form-section hidden">
                <input type="text" id="searchUser" placeholder="Search user by email">
                <div id="searchResults"></div>
                <input type="number" id="sendAmount" placeholder="Enter amount">
                <button id="sendMoneySubmit">Send</button>
                <button class="cancelBtn">Cancel</button>
            </div>

            <!-- Recent Transactions -->
            <h4>Recent Transactions</h4>
            <table id="recentTransactions">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Type</th>
                        <th>Amount</th>
                        <th>To/From</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

        <!-- Transactions Section -->
        <section id="transactions" class="tab-section">
            <div class="transaction-tabs">
                <button class="trans-tab active" data-type="all">All</button>
                <button class="trans-tab" data-type="sent">Sent</button>
                <button class="trans-tab" data-type="received">Received</button>
            </div>
            <table id="transactionsTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Type</th>
                        <th>Amount</th>
                        <th>To/From</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

        <!-- Profile Section -->
        <section id="profile" class="tab-section">
            <!-- View Profile -->
            <div id="viewProfile">
                <p><strong>Name:</strong> <span id="profileName"></span></p>
                <p><strong>Email:</strong> <span id="profileEmail"></span></p>
                <p><strong>Phone:</strong> <span id="profilePhone"></span></p>
                <button id="editProfileBtn">Edit Profile</button>
            </div>

            <!-- Edit Profile -->
            <div id="editProfileForm" class="form-section hidden">
                <input type="text" id="editName" placeholder="Full Name">
                <input type="tel" id="editPhone" placeholder="Phone Number">
                <button id="saveProfileBtn">Save</button>
                <button class="cancelBtn">Cancel</button>
            </div>
        </section>

    </div>

    <script src="js/apiRequest.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
